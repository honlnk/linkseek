# 生产环境编排（双层网关模式：honlnk-gateway 分流 → linkseek-gateway 专属）。
#
# 架构：
#   公网:443 → honlnk-gateway(共享, HTTPS 终止) → linkseek-gateway(项目专属, HTTPS) → linkseek-app:3000
#
# app/gateway 镜像从 Docker Hub 拉取，服务器上无需源码/构建。
# 若需本地构建 app，把 app.image 换成 app.build: .
#
# 与 docker-compose.yml（本地开发）的区别：
# - 新增 gateway 服务：项目专属 Nginx，跨双网络
# - app 不再接入 honlnk-gateway-net（由 gateway 替它接入对外网络）
# - browser-fetch 用已发布镜像（部署目录无源码可构建）
# - mysql/searxng：不映射宿主机端口（仅容器间通信，安全）
#
# 使用方式：docker compose -f docker-compose.prod.yml up -d

services:
  gateway:
    # 项目专属网关：HTTPS 终止（容器内层）+ 反代到 app
    # 配置挂载自 ./nginx/linkseek-gateway.conf，证书挂载自 ./ssl/
    image: nginx:stable-alpine
    container_name: linkseek-gateway
    restart: unless-stopped
    volumes:
      - ./nginx/linkseek-gateway.conf:/etc/nginx/conf.d/linkseek-gateway.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - linkseek-net          # 反代到 linkseek-app
      - honlnk-gateway-net    # 让 honlnk-gateway 能 proxy_pass 过来
    # 不映射端口 —— 纯容器间通信

  app:
    image: honlnk/linkseek:latest
    container_name: linkseek-app
    restart: unless-stopped
    # 应用运行时配置（含密码）从独立文件读取，该文件不进 git（.gitignore 屏蔽 env/）
    # docker compose 会自动读取同目录 .env 拿 MYSQL_* 变量给 mysql 容器
    env_file: env/app.env
    depends_on:
      mysql:
        condition: service_healthy
      searxng:
        condition: service_started
      browser-fetch:
        condition: service_healthy
    networks:
      - linkseek-net
    # 不映射端口 —— 由 linkseek-gateway 反代访问

  mysql:
    image: mysql:8.0
    container_name: linkseek-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: linkseek
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - linkseek-net
    # 不映射端口 —— 仅容器间访问

  searxng:
    image: searxng/searxng:latest
    container_name: linkseek-searxng
    restart: unless-stopped
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng/data
    environment:
      - SEARXNG_BASE_URL=http://linkseek-searxng:8080/
      # 服务器在国内，SearXNG 需通过宿主机 mihomo 代理访问 Google/DuckDuckGo 等
      # 依赖 mihomo 的 allow-lan: true（端口监听 0.0.0.0:7890）
      - HTTP_PROXY=http://172.17.0.1:7890
      - HTTPS_PROXY=http://172.17.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,linkseek-app,linkseek-mysql,linkseek-searxng,linkseek-gateway
    extra_hosts:
      # 确保 docker0 IP 在容器内可解析（部分场景需要）
      - "host.docker.internal:172.17.0.1"
    networks:
      - linkseek-net
    # 不映射端口 —— 仅容器间访问

  browser-fetch:
    # 无头浏览器渲染微容器，供 app 的 web_fetch_render 工具调用
    image: honlnk/linkseek-browser-fetch:latest
    container_name: linkseek-browser-fetch
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 服务器内存敏感，限制 Chromium 内存上限
    mem_limit: 512m
    networks:
      - linkseek-net
    # 不映射端口 —— 仅容器间访问

networks:
  linkseek-net:
    driver: bridge
  honlnk-gateway-net:
    external: true   # 复用已有的 gateway 网络

volumes:
  mysql-data:
  searxng-data:
