# 生产环境编排。
# app 容器直接拉取已发布到 Docker Hub 的镜像（honlnk/linkseek:latest），
# 服务器上无需构建。若需本地构建，把 app.image 换成 app.build: .
#
# 与 docker-compose.yml（本地开发）的区别：
# - app 容器：拉取镜像运行（Dockerfile 仍保留在仓库里供本地/CI 构建用）
# - mysql/searxng：不映射宿主机端口（仅容器间通信，安全）
# - 双网络：linkseek-net（内部通信）+ honlnk-gateway-net（让 gateway 反代）
#
# 使用方式：docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: honlnk/linkseek:latest
    container_name: linkseek-app
    restart: unless-stopped
    # 应用运行时配置（含密码）从独立文件读取，该文件不进 git（.gitignore 屏蔽 env/）
    # docker compose 会自动读取同目录 .env 拿 MYSQL_* 变量给 mysql 容器
    env_file: env/app.env
    depends_on:
      mysql:
        condition: service_healthy
      searxng:
        condition: service_started
      browser-fetch:
        condition: service_healthy
    networks:
      - linkseek-net
      - honlnk-gateway-net
    # 不映射端口 —— 由 honlnk-gateway 反代访问

  mysql:
    image: mysql:8.0
    container_name: linkseek-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: linkseek
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - linkseek-net
    # 不映射端口 —— 仅容器间访问

  searxng:
    image: searxng/searxng:latest
    container_name: linkseek-searxng
    restart: unless-stopped
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng/data
    environment:
      - SEARXNG_BASE_URL=http://linkseek-searxng:8080/
      # 服务器在国内，SearXNG 需通过宿主机 mihomo 代理访问 Google/DuckDuckGo 等
      # 依赖 mihomo 的 allow-lan: true（端口监听 0.0.0.0:7890）
      - HTTP_PROXY=http://172.17.0.1:7890
      - HTTPS_PROXY=http://172.17.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,linkseek-app,linkseek-mysql,linkseek-searxng
    extra_hosts:
      # 确保 docker0 IP 在容器内可解析（部分场景需要）
      - "host.docker.internal:172.17.0.1"
    networks:
      - linkseek-net
    # 不映射端口 —— 仅容器间访问

  browser-fetch:
    # 无头浏览器渲染微容器，供 app 的 web_fetch_render 工具调用
    build: ./browser-fetch
    image: honlnk/linkseek-browser-fetch:latest
    container_name: linkseek-browser-fetch
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 服务器内存敏感，限制 Chromium 内存上限
    mem_limit: 512m
    networks:
      - linkseek-net
    # 不映射端口 —— 仅容器间访问

networks:
  linkseek-net:
    driver: bridge
  honlnk-gateway-net:
    external: true   # 复用已有的 gateway 网络

volumes:
  mysql-data:
  searxng-data:
