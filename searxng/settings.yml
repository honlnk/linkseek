# SearXNG 配置（本地开发）
# 关键项：启用 json 格式输出、关闭限流、设置 secret_key
use_default_settings: true

general:
  instance_name: "linkseek Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

server:
  secret_key: "dev-secret-change-in-production-please-use-openssl-rand-hex-32"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true
