# linkseek 反向代理配置
# 部署位置：/home/honlnk/honlnk-gateway/conf.d/linkseek.honlnk.com.conf
#
# 功能：
# - HTTPS 终止（Let's Encrypt 证书）
# - 反代到 linkseek-app 容器（3000 端口）
# - HTTP → HTTPS 自动跳转
# - 支持 MCP Streamable HTTP 的 SSE 长连接

# ---- HTTPS ----
server {
    listen 443 ssl;
    http2 on;
    server_name linkseek.honlnk.com;

    # Let's Encrypt 证书（bind mount: /home/honlnk/linkseek/ssl → /etc/nginx/ssl-linkseek）
    ssl_certificate     /etc/nginx/ssl-linkseek/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl-linkseek/privkey.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 上传/响应体大小（web_fetch 抓取的内容可能较大）
    client_max_body_size 10m;

    location / {
        proxy_pass http://linkseek-app:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # MCP Streamable HTTP 可能返回 SSE 流（长连接）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ---- HTTP → HTTPS 跳转 ----
server {
    listen 80;
    server_name linkseek.honlnk.com;

    location / {
        return 301 https://$host$request_uri;
    }
}
