# linkseek 分流配置（部署到 honlnk-gateway 的 conf.d/）
# 部署位置：/home/honlnk/honlnk-gateway/conf.d/linkseek.honlnk.com.conf
#
# 职责：仅做外层 HTTPS 终止 + 转发到 linkseek 项目专属 gateway。
# 路由细节（SSE 长连接、SPA 回退、安全头等）由 linkseek-gateway 自管。
# 证书由 honlnk-gateway 持有（/etc/nginx/ssl-linkseek）。

# ---- HTTPS：终止后转发到项目专属 gateway ----
server {
    listen 443 ssl;
    http2 on;
    server_name linkseek.honlnk.com;

    # 证书（bind mount: /home/honlnk/linkseek/ssl → /etc/nginx/ssl-linkseek）
    ssl_certificate     /etc/nginx/ssl-linkseek/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl-linkseek/privkey.pem;

    location / {
        # 转发到 linkseek 项目专属网关（容器间网络，HTTPS）
        proxy_pass https://linkseek-gateway:443;
        proxy_ssl_verify off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # MCP Streamable HTTP 可能返回 SSE 流（长连接）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ---- HTTP → HTTPS 跳转 ----
server {
    listen 80;
    server_name linkseek.honlnk.com;

    location / {
        return 301 https://$host$request_uri;
    }
}
