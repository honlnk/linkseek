# linkseek 项目专属网关（运行在 linkseek-gateway 容器内）
# 挂载路径：/etc/nginx/conf.d/linkseek-gateway.conf
#
# 部署位置：/home/honlnk/linkseek/nginx/linkseek-gateway.conf
# 由 docker-compose.prod.yml 的 gateway 服务挂载
#
# 职责：HTTPS 终止（容器内层）→ 反代到 linkseek-app:7300
# 外层 honlnk-gateway 已做一次 HTTPS 终止并转为 HTTPS 转发到这里，
# 这里再做一次 TLS（容器间网络），路由/SSE/安全头全部在此自管。
# 证书由 renew-hook.sh 续期后通过 docker exec linkseek-gateway nginx -s reload 生效。
#
# 双域名：
#   linkseek.honlnk.com         公开文档站 + /mcp 端点（应用层按 Host 分流返回文档页）
#   admin.linkseek.honlnk.com   管理后台（Vue SPA 登录 + Key 管理）
# 两个域名反代到同一个 linkseek-app:7300，由应用按 Host 头决定渲染文档页还是后台 SPA。

# ---- 公开文档站（linkseek.honlnk.com）----
server {
    listen 443 ssl;
    http2 on;
    server_name linkseek.honlnk.com;

    # 证书挂载自 /home/honlnk/linkseek/ssl → /etc/nginx/ssl
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 上传/响应体大小（web_fetch 抓取的内容可能较大）
    client_max_body_size 10m;

    location / {
        proxy_pass http://linkseek-app:7300;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # MCP Streamable HTTP 可能返回 SSE 流（长连接）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ---- 管理后台（admin.linkseek.honlnk.com）----
server {
    listen 443 ssl;
    http2 on;
    server_name admin.linkseek.honlnk.com;

    # 复用同一张证书（certbot 申请时同时包含两个域名）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10m;

    location / {
        proxy_pass http://linkseek-app:7300;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
