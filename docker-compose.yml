# 本地开发用的依赖容器（SearXNG + MySQL）。
# 生产部署配置（含 app 容器、nginx 反代）在后续部署阶段补齐。
services:
  mysql:
    image: mysql:8.0
    container_name: linkseek-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass_dev_only
      MYSQL_DATABASE: linkseek
      MYSQL_USER: linkseek
      MYSQL_PASSWORD: linkseek_dev_pass
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "linkseek", "-plinkseek_dev_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - linkseek-net

  searxng:
    image: searxng/searxng:latest
    container_name: linkseek-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng/data
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    networks:
      - linkseek-net

  browser-fetch:
    # Browserless 开源镜像，托管 Chromium 实例池，供 web_fetch_render 工具通过 CDP 调用
    image: ghcr.io/browserless/chromium:latest
    container_name: linkseek-browser-fetch
    restart: unless-stopped
    ports:
      # 映射 3000 可在本地访问 http://localhost:3000/docs 查看 Browserless 调试页
      - "3000:3000"
    environment:
      - TIMEOUT=60
      - CONCURRENT=2
      - TOKEN=
    healthcheck:
      # browserless v2 开源版无 /health，用 /docs/（OpenAPI 页）探活
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/docs/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    networks:
      - linkseek-net

networks:
  linkseek-net:
    driver: bridge

volumes:
  mysql-data:
  searxng-data:
